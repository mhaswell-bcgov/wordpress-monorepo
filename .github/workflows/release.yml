name: Release projects to read-only repositories

on:
  release:
    types:
      - published

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  detect-project-from-tag:
    name: Detect project from release tag
    runs-on: ubuntu-latest
    outputs:
      project: ${{ steps.detect.outputs.project }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect project and version
        id: detect
        shell: bash
        run: |
          MONO_TAG=${{ github.event.release.tag_name }}

          PROJECT="${MONO_TAG%-*}"
          VERSION="${MONO_TAG##*-}"

          echo "Detected project: $PROJECT"
          echo "Detected version: $VERSION"

          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-and-release:
    name: Build & release ${{ needs.detect-project-from-tag.outputs.project }}
    needs: detect-project-from-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(format('["{0}"]', needs.detect-project-from-tag.outputs.project)) }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js and PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Composer dependencies
        run: npx nx run ${{ matrix.project }}:composer-install

      - name: Prepare subtree and build for readonly repo
        shell: bash
        run: |
          set -e

          PROJECT=${{ matrix.project }}
          VERSION=${{ needs.detect-project-from-tag.outputs.version }}
          ROOT=$(npx nx show project $PROJECT --json | jq -r .root)

          echo "Building project $PROJECT at root: $ROOT"

          npx nx run $PROJECT:build
          echo "Build complete."

          git subtree split -P "$ROOT" -b split-branch
          git checkout split-branch

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -d "$ROOT/dist" ]; then
            cp -R "$ROOT/dist" ./dist
          fi

          git add dist
          git commit -m "chore(release): build $PROJECT@$VERSION" || echo "No build changes"

          git tag "v$VERSION"
          echo "CLEAN_TAG=v$VERSION" >> $GITHUB_ENV

      - name: Push to readonly repository
        shell: bash
        env:
          TOKEN: ${{ secrets.PUBLISH_REPO_TOKEN }}
        run: |
          PROJECT=${{ matrix.project }}
          CLEAN_TAG=${{ env.CLEAN_TAG }}

          git remote remove target 2>/dev/null || true
          git remote add target https://x-access-token:${TOKEN}@github.com/bcgov/${PROJECT}.git

          git push -f target split-branch:main

          git push target "$CLEAN_TAG"

      - name: Create GitHub Release in readonly repo
        uses: softprops/action-gh-release@v1
        with:
          repository: bcgov/${{ matrix.project }}
          tag_name: ${{ env.CLEAN_TAG }}
          name: ${{ github.event.release.name || env.CLEAN_TAG }}
          body: ${{ github.event.release.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLISH_REPO_TOKEN }}